<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frank's Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f12;
  --surface: #141720;
  --surface2: #1c2030;
  --border: #252a3a;
  --accent: #e8c84a;
  --accent2: #4af0a0;
  --red: #ff4d4d;
  --orange: #ff9a3c;
  --blue: #4ab8ff;
  --text: #e8eaf0;
  --muted: #5a6080;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --display: 'Bebas Neue', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }

.app { display: grid; grid-template-columns: 290px 1fr; grid-template-rows: auto 1fr; min-height: 100vh; }

/* HEADER */
header {
  grid-column: 1/-1;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.logo { font-family: var(--display); font-size: 26px; letter-spacing: 2px; color: var(--accent); }
.logo span { color: var(--muted); }
.header-stats { display: flex; gap: 20px; align-items: center; }
.hstat { text-align: right; }
.hstat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
.hstat-value { font-family: var(--mono); font-size: 15px; color: var(--text); }
.hstat-value.green { color: var(--accent2); }
.hstat-value.red { color: var(--red); cursor: pointer; }
.hstat-value.red:hover { opacity: .8; }

/* SIDEBAR */
aside {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px;
  display: flex; flex-direction: column; gap: 16px;
  overflow-y: auto;
}
.sidebar-section { }
.sidebar-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }

/* Goal bar */
.goal-bar-bg { background: var(--surface2); border-radius: 4px; height: 6px; margin: 6px 0; overflow: hidden; }
.goal-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 4px; transition: width .4s; }
.goal-sub { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }

/* Commission calc */
.calc-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.calc-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-family: var(--mono); font-size: 13px; }
.calc-input:focus { outline: none; border-color: var(--accent); }
.calc-result { font-family: var(--mono); font-size: 13px; color: var(--accent2); white-space: nowrap; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-box { background: var(--surface2); border-radius: 8px; padding: 10px 12px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 500; color: var(--text); font-family: var(--mono); }
.stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }
.stat-num.fire { color: var(--red); }
.stat-num.soon { color: var(--orange); }
.stat-num.done { color: var(--accent2); }

/* Add task form */
.add-form { display: flex; flex-direction: column; gap: 6px; }
.add-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 6px; font-family: var(--sans); font-size: 13px; }
.add-input:focus { outline: none; border-color: var(--accent); }
.add-row { display: flex; gap: 6px; }
.add-select { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 8px; border-radius: 6px; font-size: 12px; }
.add-select:focus { outline: none; border-color: var(--accent); }
.add-btn { background: var(--accent); color: #000; border: none; padding: 7px 14px; border-radius: 6px; font-weight: 500; font-size: 13px; cursor: pointer; white-space: nowrap; }
.add-btn:hover { opacity: .9; }

/* Filters */
.filters { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface); }
.filter-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; font-size: 11px; cursor: pointer; color: var(--muted); font-family: var(--sans); transition: all .15s; }
.filter-btn.active { background: var(--surface2); color: var(--text); border-color: var(--accent); }
.search-input { margin-left: auto; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-family: var(--sans); min-width: 160px; }
.search-input:focus { outline: none; border-color: var(--accent); }

/* MAIN */
.main { overflow-y: auto; display: flex; flex-direction: column; }
.main-inner { flex: 1; padding: 16px; }

.tasks-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.tasks-title { font-family: var(--display); font-size: 22px; letter-spacing: 2px; color: var(--accent); }
.tasks-count { font-size: 12px; color: var(--muted); font-family: var(--mono); }

/* Task groups */
.task-group { margin-bottom: 14px; }
.group-label { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; display: block; padding: 4px 0 8px; }
.group-label.fire { color: var(--red); }
.group-label.soon { color: var(--orange); }
.group-label.pipeline { color: var(--blue); }
.group-label.cold { color: var(--muted); }

/* Task card */
.task { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; transition: border-color .15s; }
.task:hover { border-color: #353a50; }
.task.done { opacity: .4; }
.task-priority { width: 4px; min-width: 4px; height: 36px; border-radius: 2px; margin-top: 2px; }
.p-fire { background: var(--red); }
.p-soon { background: var(--orange); }
.p-pipeline { background: var(--blue); }
.p-cold { background: var(--muted); }
.task-body { flex: 1; min-width: 0; }
.task-name { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.task-action { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
.task-phone { font-family: var(--mono); font-size: 11px; color: var(--blue); margin-top: 4px; display: inline-block; }
.task-addr { font-size: 11px; color: #3a4060; margin-top: 2px; }
.tag-pill { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.tag-call { background: rgba(74,184,255,.15); color: var(--blue); }
.tag-visit { background: rgba(255,154,60,.15); color: var(--orange); }
.tag-email { background: rgba(232,200,74,.15); color: var(--accent); }
.tag-followup { background: rgba(74,240,160,.15); color: var(--accent2); }
.task-controls { display: flex; flex-direction: column; gap: 4px; }
.tc-btn { border: none; padding: 4px 8px; border-radius: 5px; font-size: 10px; cursor: pointer; font-weight: 500; font-family: var(--sans); white-space: nowrap; }
.done-btn { background: rgba(74,240,160,.15); color: var(--accent2); }
.done-btn:hover { background: rgba(74,240,160,.25); }
.undo-btn { background: var(--surface2); color: var(--muted); }
.del-btn { background: rgba(255,77,77,.1); color: var(--red); }
.del-btn:hover { background: rgba(255,77,77,.2); }

.promote-btn { background: rgba(232,200,74,.12); color: var(--accent); }
.promote-btn:hover { background: rgba(232,200,74,.22); }

.empty { text-align: center; color: var(--muted); font-size: 13px; padding: 40px; }
</style>
</head>

  <div class="sidebar-section">

      <div class="stat-box"><div class="stat-num soon" id="soonTasks">0</div><div class="stat-lbl">⚡ Soon</div></div>
      <div class="stat-box"><div class="stat-num done" id="doneTasks">0</div><div class="stat-lbl">✅ Done</div></div>
    </div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Add Contact / Task</div>
    <div class="add-form">
      <input type="text" id="addName" class="add-input" placeholder="Shop name">
      <input type="text" id="addAction" class="add-input" placeholder="Action / note">
      <input type="text" id="addPhone" class="add-input" placeholder="Phone">
      <input type="text" id="addAddr" class="add-input" placeholder="Address (optional)">
      <div class="add-row">
        <select id="addPriority" class="add-select">

          <option value="soon">⚡ Soon</option>
          <option value="pipeline" selected>📈 Pipeline</option>
          <option value="cold">❄️ Cold</option>
        </select>
        <select id="addTag" class="add-select">
          <option value="call">📞 Call</option>
          <option value="visit">🚗 Visit</option>
          <option value="email">✉️ Email</option>
          <option value="followup">🔁 Follow Up</option>
        </select>
      </div>
      <button class="add-btn" onclick="addTask()">+ Add</button>
    </div>
  </div>
</aside>

<div class="main">
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All Open</button>
    <button class="filter-btn" onclick="setFilter('fire',this)">🔥 Fire</button>
    <button class="filter-btn" onclick="setFilter('soon',this)">⚡ Soon</button>
    <button class="filter-btn" onclick="setFilter('pipeline',this)">📈 Pipeline</button>

    <button class="filter-btn" onclick="setFilter('call',this)">📞 Calls</button>
    <button class="filter-btn" onclick="setFilter('visit',this)">🚗 Walk-ins</button>
    <button class="filter-btn" onclick="setFilter('done',this)">✅ Done</button>

  </div>
  <div class="main-inner">

      <div class="tasks-count" id="taskCount"></div>
    </div>
    <div id="taskList"></div>
  </div>
</div>

</div>

let tasks = [];
let curFilter = 'all';
let nextId = 200;

function load() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      tasks = parsed.tasks || [];
      nextId = parsed.nextId || 200;
      // Merge in any new contacts not already saved
      const existingIds = new Set(tasks.map(t => t.id));
      ALL_CONTACTS.forEach(c => {
        if (!existingIds.has(c.id)) tasks.push({...c});
      });
    } catch(e) {
      tasks = ALL_CONTACTS.map(c => ({...c}));
    }
  } else {
    tasks = ALL_CONTACTS.map(c => ({...c}));
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({tasks, nextId}));
}

function updateDate() {
  const d = new Date();
  document.getElementById('dateDisplay').textContent = d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}).toUpperCase();
}

function calcComm() {
  const v = parseFloat(document.getElementById('calcInput').value) || 0;
  document.getElementById('calcResult').textContent = '= $' + (v * 0.07).toFixed(2);
}

function updateWeekEarnings() {
  const val = prompt('Enter commission earned this week ($):');
  if (val !== null && !isNaN(parseFloat(val))) {
    localStorage.setItem(WEEK_KEY, parseFloat(val));
    render();
  }
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function addTask() {
  const name = document.getElementById('addName').value.trim();
  const action = document.getElementById('addAction').value.trim();
  if (!name) return;
  tasks.push({
    id: nextId++,
    name,
    action: action || 'Follow up',
    phone: document.getElementById('addPhone').value.trim(),
    addr: document.getElementById('addAddr').value.trim(),
    priority: document.getElementById('addPriority').value,
    tag: document.getElementById('addTag').value,
    done: false,
    created: Date.now()
  });
  ['addName','addAction','addPhone','addAddr'].forEach(id => document.getElementById(id).value = '');
  save(); render();
}

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  t.doneAt = t.done ? Date.now() : null;
  save(); render();
}

function deleteTask(id) {
  if (!confirm('Delete this contact?')) return;
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}

function promote(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const order = ['cold','pipeline','soon','fire'];
  const idx = order.indexOf(t.priority);
  if (idx < order.length - 1) t.priority = order[idx + 1];
  save(); render();
}

const priorityOrder = {fire:0, soon:1, pipeline:2, cold:3};
const tagLabels = {call:'📞 Call', visit:'🚗 Visit', email:'✉️ Email', followup:'🔁 Follow Up'};
const tagClass = {call:'tag-call', visit:'tag-visit', email:'tag-email', followup:'tag-followup'};

function render() {
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();

  let visible = tasks.filter(t => {
    const matchSearch = !search ||
      t.name.toLowerCase().includes(search) ||
      (t.phone||'').includes(search) ||
      (t.action||'').toLowerCase().includes(search) ||
      (t.addr||'').toLowerCase().includes(search);
    if (!matchSearch) return false;
    if (curFilter === 'all') return !t.done;
    if (curFilter === 'done') return t.done;
    if (['fire','soon','pipeline','cold'].includes(curFilter)) return t.priority === curFilter && !t.done;
    if (['call','visit','email','followup'].includes(curFilter)) return t.tag === curFilter && !t.done;
    return true;
  });

  visible.sort((a,b) => priorityOrder[a.priority] - priorityOrder[b.priority]);

  const open = tasks.filter(t => !t.done);
  const doneToday = tasks.filter(t => t.done && t.doneAt && (Date.now() - t.doneAt < 86400000));
  document.getElementById('totalTasks').textContent = open.length;
  document.getElementById('fireTasks').textContent = open.filter(t=>t.priority==='fire').length;
  document.getElementById('soonTasks').textContent = open.filter(t=>t.priority==='soon').length;
  document.getElementById('doneTasks').textContent = doneToday.length;
  document.getElementById('hOpenCount').textContent = open.length;
  document.getElementById('hFireCount').textContent = open.filter(t=>t.priority==='fire').length;

  const weekEarned = parseFloat(localStorage.getItem(WEEK_KEY) || '0');
  const pct = Math.min(100, (weekEarned / 3500) * 100);
  document.getElementById('weekEarned').textContent = '$' + weekEarned.toFixed(0) + ' earned';
  document.getElementById('goalFill').style.width = pct + '%';
  const gap = 3500 - weekEarned;
  document.getElementById('goalGap').textContent = gap > 0 ? '$' + gap.toFixed(0) + ' to go' : '✅ GOAL HIT!';
  document.getElementById('goalPct').textContent = pct.toFixed(0) + '%';
  document.getElementById('hWeekGap').textContent = gap > 0 ? '$' + gap.toFixed(0) + ' to go' : '✅ HIT!';

  document.getElementById('taskCount').textContent = visible.length + ' accounts';

  if (visible.length === 0) {
    document.getElementById('taskList').innerHTML = '<div class="empty">No contacts match. Try a different filter or search.</div>';
    return;
  }

  const groups = {fire:[], soon:[], pipeline:[], cold:[], done:[]};
  visible.forEach(t => {
    if (t.done) groups.done.push(t);
    else groups[t.priority] ? groups[t.priority].push(t) : groups.cold.push(t);
  });

  const groupMeta = {
    fire: {label:'🔥 ON FIRE — DO TODAY', cls:'fire'},
    soon: {label:'⚡ THIS WEEK', cls:'soon'},
    pipeline: {label:'📈 WARM PIPELINE', cls:'pipeline'},
    cold: {label:'❄️ COLD — BUILD THE LIST', cls:'cold'},
    done: {label:'✅ COMPLETED TODAY', cls:'pipeline'},
  };

  let html = '';
  ['fire','soon','pipeline','cold','done'].forEach(g => {
    if (!groups[g] || !groups[g].length) return;
    const meta = groupMeta[g];
    html += `<div class="task-group"><span class="group-label ${meta.cls}">${meta.label} (${groups[g].length})</span>`;
    groups[g].forEach(t => {
      html += `<div class="task${t.done?' done':''}">
        <div class="task-priority p-${t.done?'cold':t.priority}"></div>
        <div class="task-body">
          <div class="task-name">${t.name} <span class="tag-pill ${tagClass[t.tag]||'tag-call'}">${tagLabels[t.tag]||'📞'}</span></div>
          <div class="task-action">${t.action}</div>
          ${t.phone ? `<div><span class="task-phone">${t.phone}</span></div>` : ''}
          ${t.addr ? `<div class="task-addr">${t.addr}</div>` : ''}
        </div>
        <div class="task-controls">
          ${t.done
            ? `<button class="tc-btn undo-btn" onclick="toggleDone(${t.id})">↩ Undo</button>`
            : `<button class="tc-btn done-btn" onclick="toggleDone(${t.id})">✓ Done</button>`}
          ${!t.done && t.priority !== 'fire' ? `<button class="tc-btn promote-btn" onclick="promote(${t.id})">↑ Up</button>` : ''}
          <button class="tc-btn del-btn" onclick="deleteTask(${t.id})">✕</button>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('taskList').innerHTML = html;
}

document.getElementById('hWeekGap').addEventListener('click', updateWeekEarnings);
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.closest('.add-form')) addTask();
});

load();
updateDate();
render();
setInterval(updateDate, 60000);
</script>
